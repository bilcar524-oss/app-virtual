<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Training App</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;}
  #root{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  input,button,select{font-family:inherit;}

  /* Login */
  .login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;padding:32px;}
  .login-wrap h1{font-size:28px;font-weight:800;letter-spacing:-1px;}
  .login-wrap h1 span{color:#1D9E75;}
  .login-wrap input{width:100%;padding:14px 16px;border-radius:12px;border:1.5px solid #2a2a2a;background:#1a1a1a;color:#f0f0f0;font-size:16px;outline:none;}
  .login-wrap input:focus{border-color:#1D9E75;}
  .login-wrap button{width:100%;padding:14px;border-radius:12px;border:none;background:#1D9E75;color:#fff;font-size:16px;font-weight:700;cursor:pointer;}

  /* Tabs */
  .tabs{display:flex;border-top:1px solid #1e1e1e;background:#0f0f0f;position:sticky;bottom:0;}
  .tab{flex:1;padding:12px 8px 16px;text-align:center;cursor:pointer;font-size:12px;color:#555;border:none;background:none;}
  .tab.active{color:#1D9E75;}
  .tab-icon{font-size:20px;display:block;margin-bottom:2px;}

  /* Main */
  .main{flex:1;overflow-y:auto;padding:16px 16px 80px;}

  /* Header semana */
  .week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .week-header h2{font-size:17px;font-weight:700;}
  .week-nav{padding:6px 12px;border-radius:8px;border:1px solid #2a2a2a;background:#1a1a1a;color:#f0f0f0;cursor:pointer;font-size:13px;}

  /* Banner bloque */
  .banner{border-radius:14px;padding:14px 16px;margin-bottom:16px;font-size:13px;line-height:1.5;}
  .banner-title{font-size:15px;font-weight:800;margin-bottom:6px;}

  /* Selector sesión */
  .session-tabs{display:flex;gap:8px;margin-bottom:16px;}
  .session-tab{flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid #2a2a2a;background:#1a1a1a;color:#888;font-size:14px;font-weight:700;cursor:pointer;text-align:center;}
  .session-tab.active{border-color:currentColor;color:#f0f0f0;background:#222;}

  /* Ejercicio card */
  .ex-card{background:#1a1a1a;border-radius:14px;padding:14px;margin-bottom:12px;}
  .ex-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .ex-name{font-size:15px;font-weight:700;}
  .ex-reps-range{font-size:12px;color:#888;margin-top:2px;}
  .ex-kg-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
  .ex-kg-input{width:72px;padding:6px 8px;border-radius:8px;border:1.5px solid #2a2a2a;background:#222;color:#f0f0f0;font-size:15px;font-weight:700;text-align:center;outline:none;}
  .ex-kg-input.placeholder{color:#555;}
  .ex-kg-input:focus{border-color:#1D9E75;}
  .ex-prev{font-size:11px;color:#555;text-align:right;}
  .series-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
  .series-label{font-size:12px;color:#555;width:50px;flex-shrink:0;}
  .series-input{flex:1;padding:8px 10px;border-radius:8px;border:1.5px solid #2a2a2a;background:#222;color:#f0f0f0;font-size:15px;text-align:center;outline:none;-moz-appearance:textfield;}
  .series-input::-webkit-outer-spin-button,.series-input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .series-input:focus{border-color:#1D9E75;}
  .biserie-sep{text-align:center;font-size:12px;color:#555;margin:6px 0;font-weight:700;}

  /* Botones guardar */
  .save-btns{display:flex;gap:10px;margin-top:20px;}
  .btn-save{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
  .btn-draft{background:#1e1e1e;color:#aaa;}
  .btn-submit{background:#1D9E75;color:#fff;}

  /* Dashboard */
  .dash-card{background:#1a1a1a;border-radius:14px;padding:16px;margin-bottom:14px;}
  .dash-card h3{font-size:14px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
  .stat-row{display:flex;justify-content:space-between;margin-bottom:8px;}
  .stat-label{font-size:13px;color:#888;}
  .stat-val{font-size:13px;font-weight:700;}
  select.ex-selector{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #2a2a2a;background:#222;color:#f0f0f0;font-size:14px;margin-bottom:14px;outline:none;}

  /* Chart */
  .chart-wrap{width:100%;overflow-x:auto;}
  svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

  /* Toast */
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;z-index:999;pointer-events:none;}

  /* Loading */
  .loading{text-align:center;padding:40px;color:#555;font-size:14px;}

  .user-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .user-name{font-size:20px;font-weight:800;}
  .logout-btn{padding:6px 12px;border-radius:8px;border:1px solid #2a2a2a;background:none;color:#555;font-size:12px;cursor:pointer;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/https://script.google.com/macros/s/AKfycbz1-KwqRKwSWejkKKNJ8CjvIjRQDYx7o6x1YYHgx2kvhgH5HPGLMq6xd4539sDPwIs/exec;
const BLOCK_COLORS = {
  volumen:'#1D9E75', intensidad:'#378ADD', fuerza:'#DC2626',
  man:'#6B7280', base:'#F59E0B', deporte:'#8B5CF6'
};
const BLOCK_BANNERS = {
  volumen:"Vos intentá mejorar las reps entreno tras entreno con el peso indicado. Cuando llegues al techo del rango, los kg se ajustan solos para la siguiente sesión. Cada 2 semanas la app te agregará una serie efectiva extra.",
  intensidad:"Vos intentá mejorar las reps entreno tras entreno con el peso indicado. Cuando llegues al techo del rango, los kg se ajustan solos para la siguiente sesión. En la última serie de cada ejercicio, aplicá una técnica de intensidad.",
  fuerza:"Vos intentá mejorar las reps entreno tras entreno con el peso indicado. Cada 2 semanas la app aumentará los kg con el fin de progresar en carga. Intentá no perder reps con el peso nuevo.",
  man:"Vos intentá mejorar las reps entreno tras entreno con el peso indicado. Cuando llegues al techo del rango, los kg se ajustan solos para la siguiente sesión.",
  base:"Las series y reps son fijas. Los kg los elegís vos: el peso no debe generarte dolor, pérdida de técnica ni desconfianza. Solo cuando lo sentís fácil, agregás peso — pero no series ni reps.",
  deporte:"El protocolo series-reps-kg ya está pautado. El objetivo es respetar lo indicado por la app y ejecutar cada rep a máxima velocidad. Si perdés velocidad, frenás la serie. Si te quedan series, podés sacar peso."
};
const BLOCK_EMOJIS = {volumen:'📈',intensidad:'⚡',fuerza:'💪',man:'🔄',base:'🏗️',deporte:'🏅'};

function normalizeBlock(b){
  if(!b) return 'volumen';
  const s = String(b).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  if(s.includes('volumen')) return 'volumen';
  if(s.includes('intensidad')) return 'intensidad';
  if(s.includes('fuerza')) return 'fuerza';
  if(s.includes('man') || s.includes('mant') || s.includes('manten')) return 'man';
  if(s.includes('base') || s.includes('rehab') || s.includes('rehabilitacion')) return 'base';
  if(s.includes('deporte')) return 'deporte';
  return 'volumen';
}

function getMondayOf(dateStr){
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

function getWeekLabel(startDate, wkNum){
  const monday = getMondayOf(startDate);
  monday.setDate(monday.getDate() + (wkNum - 1) * 7);
  const sunday = new Date(monday);
  sunday.setDate(sunday.getDate() + 6);
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const fmt = d => `${d.getDate()} ${months[d.getMonth()]}`;
  return `Sem ${wkNum} · ${fmt(monday)} - ${fmt(sunday)}`;
}

function calcCurrentWeek(startDate){
  const monday = getMondayOf(startDate);
  const now = new Date();
  const diff = Math.floor((now - monday) / (7 * 24 * 3600 * 1000));
  return Math.max(1, diff + 1);
}

function calcSeries(block, baseSeries, wkNum){
  if(block === 'base') return 4;
  if(block === 'volumen'){
    const extra = Math.floor((wkNum - 1) / 2);
    return Math.min(4, baseSeries + extra);
  }
  return baseSeries;
}

function calcKgNext(kg, block, wkNum, maxRepsReached){
  if(!kg) return kg;
  if(block === 'fuerza'){
    if(wkNum % 2 === 0) return Math.round((kg * 1.05) / 2.5) * 2.5;
    return kg;
  }
  if(maxRepsReached){
    return Math.round((kg * 1.05) / 2.5) * 2.5;
  }
  return kg;
}

function e1rm(kg, reps){ return kg * (1 + reps / 30); }

function ls(k, v){ if(v === undefined) return localStorage.getItem(k); localStorage.setItem(k, JSON.stringify(v)); }
function lg(k){ try{ return JSON.parse(localStorage.getItem(k)); } catch{ return null; } }

// ---- COMPONENTS ----

function LineChart({data, color}){
  if(!data || data.length < 2) return <div style={{color:'#555',fontSize:13,textAlign:'center',padding:'20px 0'}}>Necesitás al menos 2 semanas guardadas para ver el gráfico.</div>;
  const W=340, H=120, PX=30, PY=16;
  const vals = data.map(d=>d.val);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const cx = i => PX + i * (W - PX*2) / (data.length - 1);
  const cy = v => PY + (1 - (v - min)/range) * (H - PY*2);
  const pts = data.map((d,i) => `${cx(i)},${cy(d.val)}`).join(' ');
  return(
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>
        {data.map((d,i)=>(
          <g key={i}>
            <circle cx={cx(i)} cy={cy(d.val)} r="4" fill={color}/>
            <text x={cx(i)} y={H-2} textAnchor="middle" fontSize="10" fill="#555">{d.label}</text>
            <text x={cx(i)} y={cy(d.val)-8} textAnchor="middle" fontSize="10" fill="#aaa">{Math.round(d.val)}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function Dashboard({user, rutina, ejerciciosMap}){
  const hist = lg(`app_${user}_hist`) || [];
  const color = BLOCK_COLORS[rutina?.block || 'volumen'];

  // ejercicios con historial de e1rm
  const allExs = new Set();
  hist.forEach(h=>{ if(h.e1rm) Object.keys(h.e1rm).forEach(k=>allExs.add(k)); });
  const exList = [...allExs];
  const [selEx, setSelEx] = useState(exList[0] || '');

  const chartData = hist.slice(-8).map(h=>({
    label: `S${h.wk}`,
    val: h.e1rm?.[selEx] || 0
  })).filter(d=>d.val > 0);

  const first = chartData[0]?.val;
  const last = chartData[chartData.length-1]?.val;
  const diff = first && last ? ((last - first)/first*100).toFixed(1) : null;

  const startDate = lg(`app_${user}_startdate`);
  const wkNum = lg(`app_${user}_wknum`) || 1;
  const blockStart = rutina?.blockStart || 1;
  const weeksInBlock = wkNum - blockStart + 1;

  return(
    <div>
      <div className="user-row">
        <div className="user-name">Hola, {user} 👋</div>
      </div>

      {rutina && (
        <div className="dash-card">
          <h3>Estado actual</h3>
          <div className="stat-row">
            <span className="stat-label">Semana</span>
            <span className="stat-val" style={{color}}>{startDate ? getWeekLabel(startDate, wkNum) : `Sem ${wkNum}`}</span>
          </div>
          <div className="stat-row">
            <span className="stat-label">Bloque</span>
            <span className="stat-val" style={{color}}>{BLOCK_EMOJIS[rutina.block]} {rutina.block}</span>
          </div>
          <div className="stat-row">
            <span className="stat-label">Semanas en bloque</span>
            <span className="stat-val">{weeksInBlock}</span>
          </div>
        </div>
      )}

      {exList.length > 0 && (
        <div className="dash-card">
          <h3>Progresión E1RM</h3>
          <select className="ex-selector" value={selEx} onChange={e=>setSelEx(e.target.value)}>
            {exList.map(ex=><option key={ex} value={ex}>{ex}</option>)}
          </select>
          <LineChart data={chartData} color={color}/>
          {diff !== null && (
            <div className="stat-row" style={{marginTop:12}}>
              <span className="stat-label">Progreso total</span>
              <span className="stat-val" style={{color: parseFloat(diff)>=0?'#1D9E75':'#DC2626'}}>
                {parseFloat(diff)>=0?'+':''}{diff}%
              </span>
            </div>
          )}
          {first && last && (
            <div className="stat-row">
              <span className="stat-label">Inicio → Ahora</span>
              <span className="stat-val">{Math.round(first)} → {Math.round(last)} kg</span>
            </div>
          )}
        </div>
      )}

      {hist.length === 0 && (
        <div className="dash-card" style={{color:'#555',fontSize:13,textAlign:'center'}}>
          Todavía no guardaste ninguna semana. ¡Empezá a entrenar!
        </div>
      )}
    </div>
  );
}

function ExerciseCard({ex, sesion, wkNum, block, baseSeries, blockStart, hist}){
  const series = calcSeries(block, baseSeries, wkNum);
  const kgKey = `app_${ex.user}_sessKg`;
  const kgStore = lg(kgKey) || {};
  const exKgKey = `${sesion}_${ex.Nombre}`;

  const [kg, setKg] = useState(kgStore[exKgKey] || '');
  const [repsArr, setRepsArr] = useState(() => {
    const draft = lg(`app_${ex.user}_draft_sem_${wkNum}`) || {};
    return draft[`${sesion}_${ex.Nombre}`] || Array(series).fill('');
  });

  // best previous
  const prevHist = (hist || []).filter(h=> h.wk < wkNum && h.sesion === sesion && h.data?.[ex.Nombre]);
  let prevBest = null;
  prevHist.forEach(h=>{
    const d = h.data[ex.Nombre];
    if(d && d.reps && d.kg){
      if(!prevBest || d.reps > prevBest.reps) prevBest = d;
    }
  });

  const kgNum = parseFloat(kg) || parseFloat(ex.Kg) || 0;
  const hiNum = parseInt(ex.Hi) || 12;

  const handleKgChange = (val) => {
    setKg(val);
    const store = lg(kgKey) || {};
    store[exKgKey] = val;
    ls(kgKey, store);
  };

  const handleRepsChange = (idx, val) => {
    const arr = [...repsArr];
    arr[idx] = val;
    setRepsArr(arr);
    // save draft
    const draftKey = `app_${ex.user}_draft_sem_${wkNum}`;
    const draft = lg(draftKey) || {};
    draft[`${sesion}_${ex.Nombre}`] = arr;
    ls(draftKey, draft);
  };

  const defaultReps = block === 'base' ? Math.round((parseInt(ex.Low||6)+parseInt(ex.Hi||12))/2) : '';

  return(
    <div className="ex-card">
      <div className="ex-header">
        <div>
          <div className="ex-name">{ex.Nombre}</div>
          <div className="ex-reps-range">{ex.Low}–{ex.Hi} reps · {ex.Categoria}</div>
        </div>
        <div className="ex-kg-wrap">
          <input
            className={`ex-kg-input${!kg?' placeholder':''}`}
            type="number"
            inputMode="decimal"
            placeholder={ex.Kg || 'kg'}
            value={kg}
            onChange={e=>handleKgChange(e.target.value)}
          />
          {prevBest && <div className="ex-prev">Ant: {prevBest.reps}r × {prevBest.kg}kg</div>}
        </div>
      </div>
      {Array.from({length: series}).map((_,i)=>{
        const defVal = block === 'base' ? String(defaultReps) : (block === 'deporte' ? String(ex.Low||'') : '');
        return(
          <div key={i} className="series-row">
            <span className="series-label">Serie {i+1}</span>
            <input
              className="series-input"
              type="number"
              inputMode="numeric"
              placeholder={defVal || '—'}
              value={repsArr[i]}
              readOnly={block === 'deporte'}
              onChange={e=>handleRepsChange(i, e.target.value)}
            />
            <span style={{fontSize:12,color:'#555',width:30}}>reps</span>
          </div>
        );
      })}
    </div>
  );
}

function Entrenamiento({user, rutina, ejerciciosMap, wkNum, setWkNum, startDate, showToast}){
  const sessions = ['A','B','C','D'].slice(0, rutina?.numSesiones || 3);
  const [sesion, setSesion] = useState('A');
  const block = rutina?.block || 'volumen';
  const color = BLOCK_COLORS[block];
  const hist = lg(`app_${user}_hist`) || [];

  const sesionExs = (rutina?.sesiones?.[sesion] || []);

  const getExData = (nombre) => ejerciciosMap[nombre] || {Nombre:nombre, Low:6, Hi:12, Kg:'', Categoria:''};

  const handleSaveDraft = () => {
    showToast('✅ Progreso guardado');
  };

  const handleSaveWeek = async () => {
    // calcular e1rm
    const draftKey = `app_${user}_draft_sem_${wkNum}`;
    const draft = lg(draftKey) || {};
    const kgStore = lg(`app_${user}_sessKg`) || {};
    const e1rmMap = {};

    sesionExs.flat().forEach(nombre => {
      const repsArr = draft[`${sesion}_${nombre}`] || [];
      const kgVal = parseFloat(kgStore[`${sesion}_${nombre}`]) || parseFloat(ejerciciosMap[nombre]?.Kg) || 0;
      const bestReps = Math.max(...repsArr.map(r=>parseInt(r)||0));
      if(kgVal && bestReps) e1rmMap[nombre] = e1rm(kgVal, bestReps);
    });

    // progresión kg
    const newKgStore = {...kgStore};
    sesionExs.flat().forEach(nombre => {
      const exData = ejerciciosMap[nombre] || {};
      const repsArr = draft[`${sesion}_${nombre}`] || [];
      const kgVal = parseFloat(kgStore[`${sesion}_${nombre}`]) || parseFloat(exData.Kg) || 0;
      const hiNum = parseInt(exData.Hi) || 12;
      const bestReps = Math.max(...repsArr.map(r=>parseInt(r)||0));
      const maxReached = bestReps >= hiNum;
      const newKg = calcKgNext(kgVal, block, wkNum, maxReached);
      if(newKg !== kgVal) newKgStore[`${sesion}_${nombre}`] = newKg;
    });
    ls(`app_${user}_sessKg`, newKgStore);

    // guardar historial
    const histEntry = {wk:wkNum, sesion, data:{}, e1rm:e1rmMap};
    sesionExs.flat().forEach(nombre=>{
      const repsArr = draft[`${sesion}_${nombre}`] || [];
      const kgVal = parseFloat(kgStore[`${sesion}_${nombre}`]) || 0;
      histEntry.data[nombre] = {reps:Math.max(...repsArr.map(r=>parseInt(r)||0)), kg:kgVal};
    });
    const newHist = [...hist.filter(h=>!(h.wk===wkNum&&h.sesion===sesion)), histEntry];
    ls(`app_${user}_hist`, newHist);

    // POST
    try{
      await fetch(APPS_SCRIPT_URL, {
        method:'POST',
        body: JSON.stringify({user, wi:wkNum, wl:getWeekLabel(startDate,wkNum), e1rm:e1rmMap})
      });
    } catch(err){ console.warn('POST failed', err); }

    showToast('🏆 ¡Semana guardada!');
  };

  if(!rutina) return <div className="loading">Cargando rutina...</div>;

  return(
    <div>
      <div className="week-header">
        <button className="week-nav" onClick={()=>{ const n=Math.max(1,wkNum-1); setWkNum(n); ls(`app_${user}_wknum`, n); }}>← Ant</button>
        <h2>{startDate ? getWeekLabel(startDate, wkNum) : `Semana ${wkNum}`}</h2>
        <button className="week-nav" onClick={()=>{ const n=wkNum+1; setWkNum(n); ls(`app_${user}_wknum`, n); }}>Sig →</button>
      </div>

      <div className="banner" style={{background: color+'22', borderLeft:`4px solid ${color}`}}>
        <div className="banner-title" style={{color}}>{BLOCK_EMOJIS[block]} Bloque {block}</div>
        <div style={{color:'#ccc'}}>{BLOCK_BANNERS[block]}</div>
      </div>

      <div className="session-tabs">
        {sessions.map(s=>(
          <button key={s} className={`session-tab${sesion===s?' active':''}`} style={sesion===s?{color}:{}} onClick={()=>setSesion(s)}>
            Sesión {s}
          </button>
        ))}
      </div>

      {sesionExs.map((group, gi)=>{
        if(Array.isArray(group)){
          return(
            <div key={gi}>
              {group.map((nombre,ni)=>(
                <div key={nombre}>
                  {ni>0 && <div className="biserie-sep">+ BISERIE +</div>}
                  <ExerciseCard
                    ex={{...getExData(nombre), user}}
                    sesion={sesion}
                    wkNum={wkNum}
                    block={block}
                    baseSeries={rutina.series}
                    blockStart={rutina.blockStart}
                    hist={hist}
                  />
                </div>
              ))}
            </div>
          );
        }
        return(
          <ExerciseCard key={gi}
            ex={{...getExData(group), user}}
            sesion={sesion}
            wkNum={wkNum}
            block={block}
            baseSeries={rutina.series}
            blockStart={rutina.blockStart}
            hist={hist}
          />
        );
      })}

      <div className="save-btns">
        <button className="btn-save btn-draft" onClick={handleSaveDraft}>Guardar progreso</button>
        <button className="btn-save btn-submit" onClick={handleSaveWeek}>Guardar semana</button>
      </div>
    </div>
  );
}

function App(){
  const [user, setUser] = useState(()=>lg('app_user') || '');
  const [inputUser, setInputUser] = useState('');
  const [tab, setTab] = useState('inicio');
  const [rutina, setRutina] = useState(null);
  const [ejerciciosMap, setEjerciciosMap] = useState({});
  const [wkNum, setWkNum] = useState(1);
  const [startDate, setStartDate] = useState('');
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState('');
  const toastTimer = useRef(null);

  const showToast = (msg) => {
    setToast(msg);
    if(toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=>setToast(''), 2500);
  };

  const loadData = useCallback(async (u) => {
    if(!u) return;
    setLoading(true);
    try{
      const [ejRes, rutRes] = await Promise.all([
        fetch(`${APPS_SCRIPT_URL}?action=ejercicios`),
        fetch(`${APPS_SCRIPT_URL}?action=rutinas`)
      ]);
      const ejData = await ejRes.json();
      const rutData = await rutRes.json();

      const ejMap = {};
      ejData.forEach(e=>{ ejMap[e.Nombre] = e; });
      setEjerciciosMap(ejMap);

      const userRut = rutData.find(r=>r.Asesorado?.toLowerCase()===u.toLowerCase());
      if(userRut){
        const block = normalizeBlock(userRut.Bloque);
        const sd = String(userRut.FechaInicio).trim();
        ls(`app_${u}_startdate`, sd);
        setStartDate(sd);

        const parseSession = (str) => {
          if(!str) return [];
          return String(str).split(',').map(s=>s.trim()).filter(Boolean).map(g=>{
            const parts = g.split('+').map(p=>p.trim()).filter(Boolean);
            return parts.length > 1 ? parts : parts[0];
          });
        };

        const sesiones = {
          A: parseSession(userRut.SesionA),
          B: parseSession(userRut.SesionB),
          C: parseSession(userRut.SesionC),
          D: parseSession(userRut.SesionD),
        };

        const cfg = {
          block,
          series: parseInt(userRut.Series) || 3,
          numSesiones: parseInt(userRut.NumSesiones) || 3,
          blockStart: parseInt(userRut.BloqueInicio) || 1,
          sesiones
        };
        ls(`app_${u}_cfg`, cfg);
        setRutina(cfg);

        // set wkNum
        const savedWk = lg(`app_${u}_wknum`);
        if(savedWk) {
          setWkNum(savedWk);
        } else {
          const auto = calcCurrentWeek(sd);
          setWkNum(auto);
          ls(`app_${u}_wknum`, auto);
        }
      }
    } catch(err){
      console.warn('Error cargando datos', err);
      // fallback a localStorage
      const cfg = lg(`app_${u}_cfg`);
      if(cfg) setRutina(cfg);
      const sd = lg(`app_${u}_startdate`);
      if(sd) setStartDate(sd);
      const wk = lg(`app_${u}_wknum`) || 1;
      setWkNum(wk);
    }
    setLoading(false);
  }, []);

  useEffect(()=>{ if(user) loadData(user); }, [user]);

  const handleLogin = () => {
    const u = inputUser.trim();
    if(!u) return;
    ls('app_user', u);
    setUser(u);
  };

  const handleLogout = () => {
    ls('app_user', '');
    setUser('');
    setRutina(null);
  };

  if(!user){
    return(
      <div className="login-wrap">
        <h1>Training<span>App</span></h1>
        <p style={{color:'#555',fontSize:14,textAlign:'center'}}>Ingresá tu nombre para continuar</p>
        <input
          type="text"
          placeholder="Tu nombre"
          value={inputUser}
          onChange={e=>setInputUser(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&handleLogin()}
        />
        <button onClick={handleLogin}>Entrar →</button>
      </div>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <div className="main">
        {loading && <div className="loading">Cargando datos...</div>}
        {!loading && tab==='inicio' && (
          <>
            <div className="user-row">
              <div className="user-name">Hola, {user} 👋</div>
              <button className="logout-btn" onClick={handleLogout}>Salir</button>
            </div>
            <Dashboard user={user} rutina={rutina} ejerciciosMap={ejerciciosMap}/>
          </>
        )}
        {!loading && tab==='entreno' && (
          <Entrenamiento
            user={user}
            rutina={rutina}
            ejerciciosMap={ejerciciosMap}
            wkNum={wkNum}
            setWkNum={setWkNum}
            startDate={startDate}
            showToast={showToast}
          />
        )}
      </div>
      <div className="tabs">
        <button className={`tab${tab==='inicio'?' active':''}`} onClick={()=>setTab('inicio')}>
          <span className="tab-icon">🏠</span>Inicio
        </button>
        <button className={`tab${tab==='entreno'?' active':''}`} onClick={()=>setTab('entreno')}>
          <span className="tab-icon">🏋️</span>Entreno
        </button>
      </div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
